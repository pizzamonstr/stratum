name: stratum
version: '1.0.0'
config-version: 2

profile: stratum

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  stratum:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      core:
        mart_orders:
          +materialized: incremental
          +incremental_strategy: merge
          +unique_key: line_item_id
      revenue:
        +materialized: table
      marketing:
        +materialized: table
      product:
        +materialized: table
      ai:
        +materialized: table

vars:
  low_stock_threshold: 30
  parse_failure_alert_pct: 0.10
