# synthetic_config.yml
# Controls all behaviour of generate_synthetic_data.py.
# Edit this file to adjust volume, dates, SKUs, or seasonality.
# Do not hard-code these values in the script.

# ── date range ─────────────────────────────────────────────────────────────
date_range:
  start: "2023-01-01"
  end:   "2024-12-31"

# ── customer volume ────────────────────────────────────────────────────────
customers:
  total: 3000
  new_pct_year_one: 0.60
  repeat_purchase_rate: 0.35
  max_orders_per_customer: 8

# ── SKU catalogue ──────────────────────────────────────────────────────────
# Three categories: hard goods (considered purchase), consumables, accessories.
# velocity: high / medium / low -- controls stockout probability.
skus:
  - sku: HARD-001
    title: "Trail Pack Pro 45L"
    category: hard_goods
    price: 189.00
    cost: 62.00
    velocity: high

